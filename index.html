<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Because of Love SP Interactive Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Linked separate style sheet for organization -->
  <link rel="stylesheet" href="css/interactive-video.css">
</head>

<body>
  <div class="wrapper">

    <div class="video-search">
      <input id="videoSearch" type="text" placeholder="Search by date titles...">
    </div>
    
    <div id="videoList"></div>

    <div class="label">Type your name here</div>
    <input id="mcName" type="text" value="MC">

    <div class="control-bar">
      <label>
        <input type="checkbox" id="toggleCC" checked>
        Show subtitles
      </label>
      <span style="font-size:12.5px;color:#aaa;">
        Avoid fullscreen for subtitles to work
      </span>
    </div>

    <div class="player-wrap">
      <iframe
        id="yt-frame"
        src="https://www.youtube.com/embed/N1Gowi2WbIg?enablejsapi=1&playsinline=1"
        allow="encrypted-media; fullscreen"
        allowfullscreen>
      </iframe>

      <!-- ADDED: MC name box -->
      <div id="mc-name-box" class="hidden"></div>

      <div id="subs" class="hidden"></div>
    </div>

  </div>

  <script src="https://www.youtube.com/iframe_api"></script>

  <script src="js/youtube-player.js"></script>
  <script src="js/subtitles.js"></script>
  <script src="js/video-loader.js"></script>
  <script src="js/search-ui.js"></script>
</body>
</html>
